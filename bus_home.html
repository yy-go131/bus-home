<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>回家班车</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, sans-serif; background: #f2f2f7; min-height: 100vh; }
  .header { background: #fff; padding: 20px 20px 16px; border-bottom: 0.5px solid #e0e0e0; }
  .header h1 { font-size: 22px; font-weight: 600; color: #1c1c1e; }
  .header .sub { font-size: 14px; color: #8e8e93; margin-top: 3px; }
  .time-bar { background: #fff; margin: 12px 16px; border-radius: 12px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
  .time-label { font-size: 13px; color: #8e8e93; }
  .time-now { font-size: 26px; font-weight: 600; color: #1c1c1e; font-variant-numeric: tabular-nums; }
  .section-title { font-size: 13px; font-weight: 600; color: #8e8e93; padding: 0 16px 8px; text-transform: uppercase; letter-spacing: 0.04em; }
  .bus-list { margin: 0 16px 12px; }
  .bus-card { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; }
  .badge { width: 54px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .b158 { background: #dbeafe; color: #1d4ed8; }
  .b156r { background: #dcfce7; color: #15803d; }
  .b159r { background: #fef9c3; color: #854d0e; }
  .bus-info { flex: 1; }
  .bus-time { font-size: 18px; font-weight: 600; color: #1c1c1e; font-variant-numeric: tabular-nums; }
  .bus-gate { font-size: 13px; color: #8e8e93; margin-top: 2px; }
  .bus-right { text-align: right; }
  .countdown { font-size: 16px; font-weight: 600; color: #1c1c1e; }
  .countdown.soon { color: #ff3b30; }
  .countdown.ok { color: #34c759; }
  .countdown-label { font-size: 12px; color: #8e8e93; margin-top: 1px; }
  .empty { text-align: center; padding: 40px 20px; color: #8e8e93; font-size: 15px; }
  .refresh { display: block; margin: 0 16px 32px; background: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 16px; color: #007aff; font-weight: 500; width: calc(100% - 32px); cursor: pointer; }
</style>
</head>
<body>
<div class="header">
  <h1>🚌 回家班车</h1>
  <div class="sub">Port Authority → Weehawken</div>
</div>

<div class="time-bar">
  <span class="time-label">现在时间</span>
  <span class="time-now" id="now">--:--</span>
</div>

<div class="section-title">接下来5班</div>
<div class="bus-list" id="list"></div>
<button class="refresh" onclick="render()">刷新</button>

<script>
const S = {
  "158":  { gate: "Gate 202 Door 1", cls: "b158",  times: ["13:00","13:30","13:50","14:10","14:30","14:50","15:10","15:20","15:30","15:40","15:50","16:00","16:08","16:16","16:23","16:30","16:37","16:44","16:50","16:56","17:02","17:07","17:12","17:16","17:20","17:24","17:32","17:36","17:40","17:44","17:48","17:52","17:56","18:00","18:04","18:08","18:12","18:16","18:20","18:24","18:32","18:36","18:40","18:45","18:50","18:55","19:00","19:05","19:10","19:16","19:22","19:28","19:34","19:42","19:50","20:00","20:10","20:20","20:30","20:40","20:50","21:00","21:10","21:20","21:30","21:45"] },
  "156R": { gate: "Gate 201 Door 1", cls: "b156r", times: ["13:15","14:15","15:15","15:45","16:15","16:44","17:05","17:16","17:27","17:38","17:49","18:00","18:12","18:24","18:36","18:48","19:00","19:12","19:24","19:48","20:15","21:10"] },
  "159R": { gate: "Gate 201 Door 3", cls: "b159r", times: ["13:45","14:45","15:30","16:00","16:30","16:54","17:05","17:16","17:27","17:38","17:49","18:00","18:12","18:24","18:36","18:48","19:00","19:12","19:36","20:00","20:30","20:45","21:00","21:30"] }
};

function toMin(t){ const [h,m]=t.split(":").map(Number); return h*60+m; }
function fmtAMPM(t){ const [h,m]=t.split(":").map(Number); const ap=h<12?"am":"pm"; const hh=h%12||12; return hh+":"+String(m).padStart(2,"0")+ap; }

function render(){
  const now=new Date(), nowMin=now.getHours()*60+now.getMinutes();
  const h=String(now.getHours()).padStart(2,"0"), mi=String(now.getMinutes()).padStart(2,"0");
  document.getElementById("now").textContent=h+":"+mi;

  let buses=[];
  for(const [line,d] of Object.entries(S)){
    for(const t of d.times){
      const diff=toMin(t)-nowMin;
      if(diff>=0 && diff<=180) buses.push({line,gate:d.gate,cls:d.cls,time:t,diff});
    }
  }
  buses.sort((a,b)=>a.diff-b.diff);
  const top=buses.slice(0,5);
  const el=document.getElementById("list");
  if(!top.length){ el.innerHTML='<div class="empty">没有找到接下来的班车</div>'; return; }
  el.innerHTML=top.map(b=>{
    const cntClass=b.diff<=5?"soon":b.diff<=15?"ok":"";
    const cntText=b.diff===0?"出发中":b.diff+"min";
    return `<div class="bus-card">
      <div class="badge ${b.cls}">${b.line}</div>
      <div class="bus-info"><div class="bus-time">${fmtAMPM(b.time)}</div><div class="bus-gate">${b.gate}</div></div>
      <div class="bus-right"><div class="countdown ${cntClass}">${cntText}</div><div class="countdown-label">${b.diff===0?"":"后出发"}</div></div>
    </div>`;
  }).join("");
}
render();
setInterval(render,30000);
</script>
</body>
</html>
